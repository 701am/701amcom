backend:
  name: git-gateway
  branch: main

# Local development: run `npx decap-server` and uncomment the next line
# local_backend: true

media_folder: "public/assets/uploads"
public_folder: "/assets/uploads"

site_url: https://701am.com
display_url: https://701am.com
logo_url: /assets/logo-mark.svg

publish_mode: editorial_workflow

collections:
  - name: "blog"
    label: "Founder Notes"
    label_singular: "Note"
    folder: "src/content/blog"
    create: true
    delete: true
    slug: "{{slug}}"
    preview_path: "blog/{{slug}}"
    sortable_fields: ["date", "title"]
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "dek", label: "One-line summary (dek)", widget: "text", hint: "Shown under the title and in the index list." }
      - { name: "date", label: "Date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - name: "collection"
        label: "Collection"
        widget: "select"
        default: "notes"
        options:
          - { label: "Notes", value: "notes" }
          - { label: "Enrollment", value: "enrollment" }
          - { label: "AI Visibility", value: "ai-visibility" }
          - { label: "Earned Media", value: "earned-media" }
          - { label: "Playbooks", value: "playbooks" }
      - { name: "tags", label: "Tags", widget: "list", default: [], required: false }
      - { name: "author", label: "Author", widget: "string", default: "David Krug" }
      - { name: "draft", label: "Draft", widget: "boolean", default: false, required: false }
      - { name: "body", label: "Body", widget: "markdown" }
