<!--
  Netlify Forms detection file — Legend-Maker
  ────────────────────────────────────────────
  This file exists ONLY so Netlify's build-time form scanner detects the form
  schema. Users never visit this page. It's the recommended pattern for static
  site generators (Astro, Next, Nuxt) because their HTML compression sometimes
  strips Netlify's data-netlify attribute before Netlify's scanner reads it.

  This file must contain a form with the SAME `name` and the SAME input `name`
  attributes as the real form on /legend-maker. If you add fields to the real
  form, mirror them here.
-->
<!doctype html>
<html>
  <head><meta charset="utf-8"></head>
  <body>
    <form name="legend-maker" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="legend-maker" />
      <input type="text" name="bot-field" />
      <input type="email" name="email" />
    </form>
  </body>
</html>
