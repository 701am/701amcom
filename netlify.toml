[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Decap CMS admin lives at /admin/
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# SPA-style fallback for the admin app
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200
