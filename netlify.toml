[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Decap CMS admin lives at /admin/
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# SPA-style fallback for the admin app
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200
